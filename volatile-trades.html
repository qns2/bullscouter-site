<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐂</text></svg>">
  <meta name="theme-color" content="#0a0b0d">
  <title>Bull Scouter — Volatile Trades (IBRX-pattern)</title>
  <meta name="description" content="Small-cap range-trade candidates: sustained options flow + safe GEX + call-dominant. Direct URL only.">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=16">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        colors: { bull: { dark:'#0a0b0d', card:'#14161a', accent:'#00ff88',
                          blue:'#3b82f6', muted:'#94a3b8',
                          border:'rgba(255,255,255,0.1)' } }
      }}
    }
  </script>
  <style>
    body { background-color: #0a0b0d; color:#f1f5f9; -webkit-font-smoothing:antialiased; font-family:'Inter',system-ui,sans-serif; }
    .glass-card { background: rgba(20,22,26,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
    .pill { display:inline-block; padding:1px 8px; border-radius:9999px; font-size:10px; font-weight:600; letter-spacing:.04em; }
    .pill-screen { background:rgba(59,130,246,0.15); color:#93c5fd; }
    .pill-qualified { background:rgba(0,255,136,0.18); color:#86efac; }
    .pill-bullish { background:rgba(0,255,136,0.15); color:#6ee7b7; }
    .pill-warn { background:rgba(249,115,22,0.18); color:#fdba74; }
    .pill-danger { background:rgba(239,68,68,0.15); color:#fca5a5; }
    /* Zone pills — distinct color per zone */
    .zone-buy        { background:rgba(0,255,136,0.22); color:#6ee7b7; font-weight:700; }
    .zone-below_buy  { background:rgba(59,130,246,0.20); color:#93c5fd; }
    .zone-hold       { background:rgba(148,163,184,0.15); color:#cbd5e1; }
    .zone-trim       { background:rgba(249,115,22,0.22); color:#fdba74; font-weight:700; }
    .zone-above_target { background:rgba(244,63,94,0.20); color:#fda4af; }
    .zone-unknown    { background:rgba(255,255,255,0.05); color:#64748b; }
    .range-bar { position: relative; height: 6px; background: rgba(255,255,255,0.06); border-radius: 9999px; margin: 6px 0 4px 0; }
    .range-bar .buy-zone { position: absolute; height: 100%; background: rgba(0,255,136,0.30); border-radius: 9999px; }
    .range-bar .target-mark { position: absolute; top: -3px; bottom: -3px; width: 2px; background: #fdba74; }
    .range-bar .spot-mark { position: absolute; top: -4px; bottom: -4px; width: 3px; background: #f1f5f9; box-shadow: 0 0 4px rgba(255,255,255,0.5); }
    .num-pos { color:#6ee7b7; }
    .num-neg { color:#fca5a5; }
    .grid-stat { display:grid; grid-template-columns: repeat(auto-fit, minmax(110px,1fr)); gap:.5rem; }
    .stat-row { display:flex; justify-content:space-between; padding:2px 0; border-bottom:1px dashed rgba(255,255,255,0.05); font-size:11px; }
    .stat-row:last-child { border-bottom:none; }
    .stat-label { color:#94a3b8; }
    .stat-value { font-family:'SF Mono',Menlo,Consolas,monospace; }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-5xl mx-auto px-4 py-8">
    <header class="mb-8">
      <div class="text-3xl font-bold mb-1">⚡ Volatile Trades</div>
      <p class="text-bull-muted text-sm">
        IBRX-pattern range-trade candidates from Finviz screens, cross-checked
        against ThetaData options coverage. Bill-qualified means: flow ≥+5,
        safe GEX, no earnings ≤21d, positive net-delta-volume.
      </p>
      <p class="text-bull-muted text-xs mt-1" id="meta"></p>
    </header>

    <div id="loading" class="text-bull-muted text-center py-8">Loading…</div>
    <div id="empty" class="text-bull-muted text-center py-8 hidden">
      No data yet. Run <code>scripts/find_ibrx_pattern.py</code> on the host.
    </div>
    <div id="screens" class="space-y-8"></div>
  </div>

  <script>
    (async () => {
      const $loading = document.getElementById('loading');
      const $empty = document.getElementById('empty');
      const $screens = document.getElementById('screens');
      const $meta = document.getElementById('meta');

      let data;
      try {
        const r = await fetch('data/ibrx-pattern-candidates.json?v=' + Date.now());
        if (!r.ok) throw new Error(`fetch failed: ${r.status}`);
        data = await r.json();
      } catch (e) {
        $loading.textContent = `Error loading data/ibrx-pattern-candidates.json: ${e.message}`;
        return;
      }
      $loading.classList.add('hidden');
      $meta.textContent = `Generated ${data.generated_at} · v${data.version} · ` +
        `${data.total_bill_qualified || 0} Bill-qualified across ${Object.keys(data.screens).length} screens`;

      const screens = data.screens || {};
      if (Object.keys(screens).length === 0) {
        $empty.classList.remove('hidden');
        return;
      }

      const fmt = (v, d=2) => (v == null ? '—' : Number(v).toFixed(d));
      const fmtPct = (v) => (v == null ? '—' : `${v >= 0 ? '+' : ''}${Number(v).toFixed(1)}%`);
      const sgn = (v) => v == null ? 'num-muted' : (v > 0 ? 'num-pos' : (v < 0 ? 'num-neg' : ''));
      const escapeHtml = (s) => String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');

      const screenLabel = {
        'ibrx_pattern':       'IBRX-pattern (small-cap volume surge + ATR > 0.5)',
        'oversold_insider':   'Oversold + insider buys (RSI<30, short float >10%)',
        'pead':               'Post-earnings drift (this week earnings, today up)',
      };

      // Zone label + emoji + plain-English action.
      const zoneInfo = {
        'buy':          { emoji: '🟢', label: 'BUY ZONE',     hint: 'spot inside entry range' },
        'below_buy':    { emoji: '🔵', label: 'BELOW BUY',    hint: 'spot under entry — watch for floor / scale-in' },
        'hold':         { emoji: '🟡', label: 'HOLD',         hint: 'between entry and trim — sit' },
        'trim':         { emoji: '🟠', label: 'TRIM ZONE',    hint: 'scale out partial' },
        'above_target': { emoji: '🔴', label: 'ABOVE TARGET', hint: 'cycle complete or breakout' },
        'unknown':      { emoji: '⚪', label: 'NO RANGE',     hint: '' },
      };

      // Range bar: position spot + buy zone + target on a 0..max scale.
      // Floor = max(buy_low × 0.85, 0); ceiling = max(target × 1.05, spot × 1.05).
      const renderRangeBar = (c) => {
        if (!c.spot || !c.buy_low || !c.buy_high || !c.target) return '';
        const floor = Math.max(c.buy_low * 0.85, c.spot * 0.85);
        const ceil = Math.max(c.target * 1.05, c.spot * 1.05);
        const span = ceil - floor;
        if (span <= 0) return '';
        const pct = (v) => `${Math.max(0, Math.min(100, ((v - floor) / span) * 100)).toFixed(1)}%`;
        return `
          <div class="range-bar" title="Buy zone in green; target marker in orange; current spot in white.">
            <div class="buy-zone" style="left:${pct(c.buy_low)};width:calc(${pct(c.buy_high)} - ${pct(c.buy_low)});"></div>
            <div class="target-mark" style="left:${pct(c.target)};"></div>
            <div class="spot-mark" style="left:${pct(c.spot)};"></div>
          </div>
        `;
      };

      const renderCard = (c, qualified) => {
        const eDays = c.earnings_days_away;
        const eStr = eDays == null ? '—' : (eDays >= 0 ? `${eDays}d` : `${eDays}d (past)`);
        const z = zoneInfo[c.zone] || zoneInfo.unknown;
        const flags = [];
        flags.push(`<span class="pill zone-${escapeHtml(c.zone || 'unknown')}" title="${z.hint}">${z.emoji} ${z.label}</span>`);
        if (qualified) flags.push(`<span class="pill pill-qualified">BILL-QUALIFIED</span>`);
        if (c.gex_buffer === 'danger') flags.push(`<span class="pill pill-danger">GEX DANGER</span>`);
        if (eDays != null && eDays >= 0 && eDays <= 21) flags.push(`<span class="pill pill-warn">EARN ${eStr}</span>`);
        return `
          <div class="glass-card rounded-xl p-4 ${qualified ? 'border-bull-accent/40' : ''}">
            <div class="flex items-baseline justify-between mb-2">
              <span class="text-xl font-bold">${escapeHtml(c.ticker)}</span>
              <span class="font-mono text-bull-muted">$${fmt(c.spot)}</span>
            </div>
            <div class="flex flex-wrap gap-1 mb-2">${flags.join(' ')}</div>
            ${renderRangeBar(c)}
            <div class="text-[10px] text-bull-muted flex justify-between mb-2 font-mono">
              <span>Buy $${fmt(c.buy_low)}-${fmt(c.buy_high)}</span>
              <span>Target $${fmt(c.target)}</span>
            </div>
            <div class="space-y-0.5">
              <div class="stat-row"><span class="stat-label">Flow score</span><span class="stat-value ${sgn(c.flow_score)}">${c.flow_score >= 0 ? '+' : ''}${fmt(c.flow_score, 1)}</span></div>
              <div class="stat-row"><span class="stat-label">TD streak</span><span class="stat-value">${c.flow_streak ?? 0}</span></div>
              <div class="stat-row"><span class="stat-label">GEX</span><span class="stat-value">${escapeHtml(c.gex_buffer || '—')}</span></div>
              <div class="stat-row"><span class="stat-label">Zero-γ</span><span class="stat-value">$${fmt(c.gex_zero_gamma)} (${fmt(c.gex_distance_pct, 1)}%)</span></div>
              <div class="stat-row"><span class="stat-label">RV-IV gap</span><span class="stat-value ${sgn(c.rv_iv_gap)}">${c.rv_iv_gap == null ? '—' : (c.rv_iv_gap >= 0 ? '+' : '') + fmt(c.rv_iv_gap, 2)}</span></div>
              <div class="stat-row"><span class="stat-label">Net Δ vol</span><span class="stat-value ${sgn(c.net_delta_volume)}">${c.net_delta_volume == null ? '—' : (c.net_delta_volume >= 0 ? '+' : '') + fmt(c.net_delta_volume, 0)}</span></div>
              <div class="stat-row"><span class="stat-label">Earnings</span><span class="stat-value">${escapeHtml(c.earnings_date || '—')} (${eStr})</span></div>
            </div>
          </div>
        `;
      };

      $screens.innerHTML = Object.entries(screens).map(([name, screen]) => {
        const label = screenLabel[name] || name;
        const cov = screen.covered || [];
        const qualified = new Set((screen.bill_qualified || []).map(c => c.ticker));
        const covCards = cov.length === 0
          ? `<p class="text-bull-muted text-sm italic px-4 py-2">No covered tickers in this screen today.</p>`
          : `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">${cov.map(c => renderCard(c, qualified.has(c.ticker))).join('')}</div>`;
        const noCov = (screen.tickers_no_coverage || []).slice(0, 30);
        const noCovBlock = noCov.length === 0 ? '' : `
          <details class="mt-3 text-sm">
            <summary class="cursor-pointer text-bull-muted hover:text-white">
              ${noCov.length} Finviz hits without options coverage (would need universe entry)
            </summary>
            <p class="mt-2 font-mono text-xs text-bull-muted">${noCov.map(escapeHtml).join(', ')}</p>
          </details>
        `;
        return `
          <section>
            <h2 class="text-lg font-semibold mb-1">${escapeHtml(label)}</h2>
            <p class="text-xs text-bull-muted mb-3">
              ${screen.count_total} hits · ${screen.count_with_coverage} with options data ·
              ${screen.count_bill_qualified} Bill-qualified
            </p>
            ${covCards}
            ${noCovBlock}
          </section>
        `;
      }).join('');
    })();
  </script>
</body>
</html>
